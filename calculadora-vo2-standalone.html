function calcCalories(w,h,a,factor,deficit){
  return Math.round((10*w + 6.25*h - 5*a - 161)*factor + deficit);
}
function formatPhone(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2)return d;
  if(d.length<=7)return `(${d.slice(0,2)}) ${d.slice(2)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
}

function AnimatedNumber({target,duration=1200}){
  const [display,setDisplay]=useState(0);
  useEffect(()=>{
    let start=null;
    const step=(ts)=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      setDisplay(Math.round(ease*target));
      if(p<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[target]);
  return <>{display.toLocaleString("pt-BR")}</>;
}

function Reveal({children,delay=0}){
  const [show,setShow]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShow(true),delay);return()=>clearTimeout(t);},[]);
  return(
    <div style={{opacity:show?1:0,transform:show?"translateY(0)":"translateY(16px)",transition:`opacity 0.5s ease ${delay}ms, transform 0.5s ease ${delay}ms`}}>
      {children}
    </div>
  );
}

/* Stepper — card grande com +/- */
function Stepper({value,onChange,min,max,step=1,label,unit,emoji}){
  const hold    = useRef(null);
  const touched = useRef(false);

  function startHold(dir){
    onChange(v => Math.min(max, Math.max(min, v + dir * step)));
    hold.current = setInterval(() =>
      onChange(v => Math.min(max, Math.max(min, v + dir * step))), 130);
  }
  function stopHold(){ clearInterval(hold.current); }

  function onTouchStart(dir){ touched.current = true; startHold(dir); }
  function onMouseDown(dir){ if(touched.current){ touched.current = false; return; } startHold(dir); }

  return(
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"16px",padding:"20px 16px",textAlign:"center"}}>
      <div style={{fontSize:"13px",color:"rgba(255,255,255,0.4)",fontWeight:"600",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:"12px"}}>
        {emoji} {label}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
        <button
          onTouchStart={()=>onTouchStart(-1)} onTouchEnd={stopHold}
          onMouseDown={()=>onMouseDown(-1)}   onMouseUp={stopHold} onMouseLeave={stopHold}
          style={{width:"52px",height:"52px",borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:"22px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"300",userSelect:"none",WebkitUserSelect:"none",flexShrink:0}}>
          −
        </button>
        <div style={{flex:1}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:"48px",color:"#C8F135",lineHeight:"1",fontWeight:"700"}}>
            {value}
          </span>
          <span style={{color:"rgba(255,255,255,0.3)",fontSize:"13px",marginLeft:"4px"}}>{unit}</span>
        </div>
        <button
          onTouchStart={()=>onTouchStart(1)} onTouchEnd={stopHold}
          onMouseDown={()=>onMouseDown(1)}   onMouseUp={stopHold} onMouseLeave={stopHold}
          style={{width:"52px",height:"52px",borderRadius:"50%",background:"rgba(200,241,53,0.12)",border:"1px solid rgba(200,241,53,0.3)",color:"#C8F135",fontSize:"22px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"400",userSelect:"none",WebkitUserSelect:"none",flexShrink:0}}>
          +
        </button>
      </div>
    </div>
  );
}

function CalculandoScreen({ onDone }) {
  const phases = [
    { text: "Analisando seu metabolismo basal...", icon: "🧬", duration: 1100 },
    { text: "Calculando gasto energético...",      icon: "⚡", duration: 1100 },
    { text: "Ajustando para seu objetivo...",       icon: "🎯", duration: 1100 },
    { text: "Personalizando seus macros...",        icon: "🥗", duration: 900  },
    { text: "Resultado pronto!",                   icon: "✅", duration: 600  },
  ];

  const [phaseIdx, setPhaseIdx]   = useState(0);
  const [progress, setProgress]   = useState(0);
  const [textVisible, setTextVisible] = useState(true);

  useEffect(() => {
    let elapsed = 0;
    const total = phases.reduce((s, p) => s + p.duration, 0);
    const startTime = Date.now();

    // Progress bar
    const progressInterval = setInterval(() => {
      const pct = Math.min(((Date.now() - startTime) / total) * 100, 100);
      setProgress(pct);
    }, 30);

    // Phase transitions
    let idx = 0;
    function nextPhase() {
      if (idx >= phases.length - 1) {
        clearInterval(progressInterval);
        setTimeout(onDone, 500);
        return;
      }
      setTextVisible(false);
      setTimeout(() => {
        idx++;
        setPhaseIdx(idx);
        setTextVisible(true);
        setTimeout(nextPhase, phases[idx].duration);
      }, 220);
    }
    const t = setTimeout(nextPhase, phases[0].duration);
    return () => { clearTimeout(t); clearInterval(progressInterval); };
  }, []);

  const phase = phases[phaseIdx];

  return (
    <div style={{ textAlign: "center", padding: "40px 20px" }}>
      {/* Ícone animado */}
      <div style={{
        width: "90px", height: "90px", borderRadius: "50%", margin: "0 auto 32px",
        background: "rgba(200,241,53,0.08)", border: "1px solid rgba(200,241,53,0.2)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: "40px",
        opacity: textVisible ? 1 : 0,
        transform: textVisible ? "scale(1)" : "scale(0.8)",
        transition: "opacity 0.22s ease, transform 0.22s ease",
        boxShadow: "0 0 40px rgba(200,241,53,0.08)",
      }}>
        {phase.icon}
      </div>

      {/* Texto da fase */}
      <div style={{
        minHeight: "52px", display: "flex", alignItems: "center", justifyContent: "center",
        marginBottom: "40px",
      }}>
        <p style={{
          fontFamily: "'Playfair Display', serif",
          fontSize: "22px", color: "#fff", lineHeight: "1.3", margin: 0,
          opacity: textVisible ? 1 : 0,
          transform: textVisible ? "translateY(0)" : "translateY(8px)",
          transition: "opacity 0.22s ease, transform 0.22s ease",
        }}>
          {phase.text}
        </p>
      </div>

      {/* Barra de progresso */}
      <div style={{
        background: "rgba(255,255,255,0.06)", borderRadius: "4px",
        height: "4px", overflow: "hidden", marginBottom: "14px",
      }}>
        <div style={{
          height: "100%", borderRadius: "4px",
          background: "linear-gradient(90deg, #C8F135, #a8d420)",
          width: `${progress}%`,
          transition: "width 0.03s linear",
          boxShadow: "0 0 10px rgba(200,241,53,0.4)",
        }} />
      </div>

      <p style={{
        color: "rgba(255,255,255,0.25)", fontSize: "12px",
        letterSpacing: "0.06em", textTransform: "uppercase",
      }}>
        {Math.round(progress)}%
      </p>

      {/* Fases passadas */}
      <div style={{ marginTop: "32px", display: "flex", flexDirection: "column", gap: "8px" }}>
        {phases.slice(0, phaseIdx).map((p, i) => (

      </div>
    </div>
  );

              </p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"24px"}}>
                {goals.map(g=>(
                  <div key={g.id} onClick={()=>setGoal(g.id)} style={{
                    background:goal===g.id?"rgba(200,241,53,0.1)":"rgba(255,255,255,0.03)",
                    border:`1px solid ${goal===g.id?"rgba(200,241,53,0.4)":"rgba(255,255,255,0.07)"}`,
                    borderRadius:"14px",padding:"16px 10px",cursor:"pointer",
                    textAlign:"center",transition:"all 0.2s",
                  }}>
                    <div style={{fontSize:"26px",marginBottom:"6px"}}>{g.emoji}</div>
                    <div style={{color:"#fff",fontSize:"12px",fontWeight:"600",lineHeight:"1.3"}}>{g.label}</div>
                    <div style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",marginTop:"3px",lineHeight:"1.3"}}>{g.sub}</div>
                  </div>
                ))}
              </div>
            </Reveal>
            <Reveal delay={180}>
              <button style={{...btnG,opacity:activity&&goal?1:0.3,cursor:activity&&goal?"pointer":"not-allowed"}}
                onClick={()=>activity&&goal&&doCalc()}>
                Ver meu resultado →
              </button>
            </Reveal>
          </div>
        )}

        {/* ══ LEAD ══ */}
        {step==="lead"&&(
          <div>
            <Dots current={2} total={4}/>
            <Reveal>
              <div style={{background:"rgba(200,241,53,0.05)",border:"1px solid rgba(200,241,53,0.15)",borderRadius:"16px",padding:"20px",marginBottom:"22px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                <p style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",fontWeight:"600",letterSpacing:"0.12em",textTransform:"uppercase",margin:"0 0 6px"}}>Sua necessidade calórica</p>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"58px",color:"#C8F135",lineHeight:"1",filter:"blur(10px)",userSelect:"none",opacity:0.6}}>
                  {calories?.toLocaleString("pt-BR")}
                </div>
                <p style={{color:"rgba(255,255,255,0.25)",fontSize:"13px",margin:"6px 0 0"}}>kcal / dia</p>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(1px)"}}>
                  <div style={{background:"rgba(11,11,11,0.85)",border:"1px solid rgba(200,241,53,0.25)",borderRadius:"10px",padding:"9px 16px",display:"flex",alignItems:"center",gap:"7px"}}>
                    <span style={{fontSize:"14px"}}>🔒</span>
                    <span style={{color:"#fff",fontSize:"12px",fontWeight:"600"}}>Preencha para liberar</span>
                  </div>
                </div>
              </div>
            </Reveal>
            <Reveal delay={80}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",color:"#fff",margin:"0 0 5px"}}>Quase lá!</h2>
              <p style={{color:"rgba(255,255,255,0.35)",fontSize:"13px",lineHeight:"1.6",margin:"0 0 20px"}}>Preencha para liberar o resultado e receber dicas pelo WhatsApp.</p>
            </Reveal>
            <Reveal delay={140}>
              <div style={{display:"flex",flexDirection:"column",gap:"12px",marginBottom:"18px"}}>
                <div>
                  <label style={lbl}>Seu nome</label>
                  <input type="text" placeholder="Ex: Mariana" value={lead.name} onChange={e=>setLead({...lead,name:e.target.value})} style={input}/>
                </div>
                <div>
                  <label style={lbl}>E-mail</label>
                  <div style={{position:"relative"}}>
                    <input type="email" placeholder="seu@email.com" value={lead.email} onChange={e=>setLead({...lead,email:e.target.value})} style={{...input,paddingLeft:"40px"}}/>
                    <span style={{position:"absolute",left:"13px",top:"50%",transform:"translateY(-50%)",fontSize:"14px",opacity:0.4}}>✉️</span>
                  </div>
                </div>
                <div>
                  <label style={lbl}>WhatsApp</label>
                  <div style={{position:"relative"}}>
                    <input type="tel" placeholder="(11) 99999-9999" value={lead.phone}
                      onChange={e=>{const raw=e.target.value.replace(/\D/g,"").slice(0,11);setPhoneRaw(raw);setLead({...lead,phone:formatPhone(e.target.value)});}}
                      style={{...input,paddingLeft:"40px"}}/>
                    <span style={{position:"absolute",left:"13px",top:"50%",transform:"translateY(-50%)",fontSize:"14px",opacity:0.4}}>📱</span>
                  </div>
                </div>
              </div>
              <p style={{color:"rgba(255,255,255,0.18)",fontSize:"11px",textAlign:"center",margin:"0 0 16px"}}>🔒 Seus dados são privados. Sem spam.</p>
              <button style={{...btnG,opacity:okLead?1:0.3,cursor:okLead?"pointer":"not-allowed"}}
                onClick={()=>okLead&&go("calculando")}>
                🔓 Liberar meu resultado →
              </button>
            </Reveal>
          </div>
        )}


        {/* ══ CALCULANDO ══ */}
        {step==="calculando"&&(
          <CalculandoScreen onDone={()=>go("resultado")}/>
        )}

        {/* ══ RESULTADO ══ */}
        {step==="resultado"&&calories&&macros&&(
          <div>
            <Dots current={3} total={4}/>
            <Reveal>
              <p style={{color:"rgba(255,255,255,0.45)",fontSize:"13px",margin:"0 0 14px"}}>
                {(goalCopy[macros.goalId]?.greeting(lead.name.split(" ")[0]) || `Olá, ${lead.name.split(" ")[0]}!`)}
              </p>
            </Reveal>
            <Reveal delay={60}>
              <div style={{background:"linear-gradient(135deg,rgba(200,241,53,0.12) 0%,rgba(200,241,53,0.02) 100%)",border:"1px solid rgba(200,241,53,0.25)",borderRadius:"18px",padding:"26px",marginBottom:"12px",textAlign:"center"}}>
                <p style={{color:"rgba(255,255,255,0.35)",fontSize:"10px",fontWeight:"600",letterSpacing:"0.14em",textTransform:"uppercase",margin:"0 0 8px"}}>Sua necessidade calórica</p>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"60px",color:"#C8F135",lineHeight:"1",margin:"0 0 4px"}}>
                  <AnimatedNumber target={calories}/>
                </div>
                <p style={{color:"rgba(255,255,255,0.3)",fontSize:"13px",margin:0}}>kcal / dia</p>
              </div>
            </Reveal>
            <Reveal delay={100}>
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"14px 16px",marginBottom:"12px"}}>
                <p style={{color:"#fff",fontSize:"13px",lineHeight:"1.65",margin:0}}>
                  📌 {goalCopy[macros.goalId]?.insight}
                </p>
              </div>
            </Reveal>
            <Reveal delay={120}>
              <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
                {[{label:"Proteína",value:macros.prot,color:"#E07070"},{label:"Carboidrato",value:macros.carb,color:"#6BBFB5"},{label:"Gordura",value:macros.fat,color:"#D4B86A"}].map(m=>(
                  <div key={m.label} style={{flex:1,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"14px 6px",textAlign:"center"}}>
                    <div style={{color:m.color,fontSize:"19px",fontWeight:"700"}}>{m.value}g</div>
                    <div style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",marginTop:"3px",fontWeight:"500"}}>{m.label}</div>
                  </div>
                ))}
              </div>
            </Reveal>
            <Reveal delay={180}>
              <DeficitMeter deficit={macros.deficit} goalId={macros.goalId} calories={calories}/>
            </Reveal>
            <Reveal delay={240}>
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"14px 16px",marginBottom:"26px"}}>
                <p style={{color:"rgba(255,255,255,0.5)",fontSize:"13px",lineHeight:"1.65",margin:0}}>
                  ⚠️ {goalCopy[macros.goalId]?.warning}
                </p>
              </div>
            </Reveal>
            <Reveal delay={220}>
              <div style={{textAlign:"center",marginBottom:"18px"}}>
                <p style={{color:"#C8F135",fontSize:"10px",fontWeight:"700",letterSpacing:"0.16em",textTransform:"uppercase",margin:"0 0 6px"}}>VO2 Consultoria</p>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"24px",color:"#fff",margin:"0 0 6px",lineHeight:"1.2"}}>Escolha seu plano</h3>
                <p style={{color:"rgba(255,255,255,0.35)",fontSize:"13px",margin:0,lineHeight:"1.6"}}>{goalCopy[macros.goalId]?.planHook}</p>
              </div>
            </Reveal>
            {plans.map((plan,i)=>(
              <Reveal key={plan.id} delay={260+i*80}>
                <div style={{background:plan.featured?"linear-gradient(140deg,rgba(200,241,53,0.09) 0%,rgba(200,241,53,0.02) 100%)":"rgba(255,255,255,0.025)",border:`1px solid ${plan.featured?"rgba(200,241,53,0.3)":"rgba(255,255,255,0.07)"}`,borderRadius:"16px",padding:"20px",marginBottom:"10px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
                    <span style={{background:plan.featured?"rgba(200,241,53,0.15)":"rgba(255,255,255,0.06)",color:plan.featured?"#C8F135":"rgba(255,255,255,0.4)",fontSize:"10px",fontWeight:"700",letterSpacing:"0.08em",textTransform:"uppercase",padding:"4px 9px",borderRadius:"20px"}}>
                      {plan.badge}
                    </span>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:plan.featured?"#C8F135":"#fff",fontSize:"20px",fontWeight:"700",lineHeight:"1"}}>{plan.price}</div>
                      <div style={{color:"rgba(255,255,255,0.25)",fontSize:"10px"}}>à vista</div>
                    </div>
                  </div>
                  <h4 style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",color:"#fff",margin:"0 0 2px"}}>{plan.title}</h4>
                  <p style={{color:"rgba(255,255,255,0.25)",fontSize:"11px",margin:"0 0 13px"}}>{plan.installment}</p>
                  <div style={{display:"flex",flexDirection:"column",gap:"7px",marginBottom:"16px"}}>
                    {plan.items.map((item,j)=>(
                      <div key={j} style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
                        <span style={{color:"#C8F135",fontSize:"12px",lineHeight:"1.5",flexShrink:0}}>✓</span>
                        <span style={{color:"rgba(255,255,255,0.55)",fontSize:"13px",lineHeight:"1.5"}}>{item}</span>
                      </div>
                    ))}
                  </div>
                  <button style={{...btnG,background:plan.featured?"#C8F135":"rgba(255,255,255,0.07)",color:plan.featured?"#0a0a0a":"rgba(255,255,255,0.7)",padding:"12px",fontSize:"13px"}}
                    onClick={()=>window.open(`https://wa.me/5514981116567?text=${encodeURIComponent(plan.waMsg)}`,"_blank")}
                    onMouseOver={e=>e.currentTarget.style.opacity="0.85"}
                    onMouseOut={e=>e.currentTarget.style.opacity="1"}>
                    Quero este plano →
                  </button>
                </div>
              </Reveal>
            ))}
            <Reveal delay={520}>
              <button style={{width:"100%",background:"transparent",border:"none",color:"rgba(255,255,255,0.18)",fontSize:"12px",cursor:"pointer",padding:"14px",marginTop:"4px",letterSpacing:"0.04em"}}
                onClick={()=>{setActivity(null);setGoal(null);setLead({name:"",email:"",phone:""});setPhoneRaw("");go("inicio");}}>
                Recalcular
              </button>
            </Reveal>
          </div>
        )}

      </div>
    </div>
  );
}

</script>
</body>
</html>
